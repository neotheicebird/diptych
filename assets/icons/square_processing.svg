<svg xmlns="http://www.w3.org/2000/svg"
     width="48" height="48"
     viewBox="0 0 24 24">

  <!-- Base square -->
  <rect x="3" y="3"
        width="18" height="18"
        rx="2" ry="2"
        fill="none"
        stroke="#f9fafb"
        stroke-width="2.5"/>

  <defs>
    <!-- Soft glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .snake {
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 20 80;
        opacity: 0.78;
        filter: url(#softGlow);
      }
    </style>
  </defs>

  <!-- Rotation duration: 0.26s -->
  <!-- Stagger: 0.06s -->

  <!-- Violet -->
  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"
        class="snake" stroke="#753BBD">
    <animate attributeName="stroke-dashoffset"
             from="0"
             to="-100"
             dur="0.26s"
             begin="0s"
             fill="freeze"/>
  </rect>

  <!-- Blue -->
  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"
        class="snake" stroke="#147BD1">
    <animate attributeName="stroke-dashoffset"
             from="0"
             to="-100"
             dur="0.26s"
             begin="0.06s"
             fill="freeze"/>
  </rect>

